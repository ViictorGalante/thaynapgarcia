<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> cerveja e farra </title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      max-width: 400px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    .btn {
      background-color: #ff6b81;
      color: white;
    }

    .btn:hover {
      background-color: #ff4757;
    }
  </style>
</head>
<body>

<div class="container">
  <h2 id="pergunta">como preciso cortar o contato com você, principalmente no whatsapp, decidi usar uma forma diferente de propostas, utilizando a IA e o que estou aprendendo na faculdade, assim faço 2 por 1 kkkk</h2>
  <div id="botoes">
    <button class="btn" onclick="proximaPergunta()">Clique aqui para saber do que se trata</button>
  </div>
</div>

<script>
  const perguntas = [
    {
      texto: "você gostou de ter ficado a sós comigo?",
      respostas: ["Sim", "Não", "Com toda certeza do mundo"],
      correta: 0
    },
    {
      texto: "você gostou das sensações que sentiu conhecendo um pouco melhor o seu corpo?",
      respostas: ["amei ", "gostei", "não gostei", "],
      correta: 0
    },
    {
      texto: "você gostou de ter bebido comigo?",
      respostas: ["sim", "não"],
      correta: 0
    }
  ];

  let indice = -1;

  function proximaPergunta() {
    indice++;

    if (indice < perguntas.length) {
      const perguntaAtual = perguntas[indice];
      document.getElementById("pergunta").innerText = perguntaAtual.texto;

      const botoesDiv = document.getElementById("botoes");
      botoesDiv.innerHTML = "";

      perguntaAtual.respostas.forEach((resposta, i) => {
        const btn = document.createElement("button");
        btn.innerText = resposta;
        btn.className = "btn";
        btn.onclick = () => verificarResposta(i);
        botoesDiv.appendChild(btn);
      });
    } else {
      mostrarPedido();
    }
  }

  function verificarResposta(resposta) {
    proximaPergunta();
  }

  function mostrarPedido() {
    document.getElementById("pergunta").innerText = "Já que gostou, vamos hoje beber em um local reservado para relembrar essas sensações e eu poder fazer algo que estou com vontade faz tempo (pra isso você tem que estar disposta a dormir tarde)  ? ";

    const botoesDiv = document.getElementById("botoes");
    botoesDiv.innerHTML = "";

    const sim = document.createElement("button");
    sim.innerText = "SIM 🔥";
    sim.className = "btn";
    sim.onclick = () => {
      document.getElementById("pergunta").innerText = "já que clicou no sim, agora me liga pra gente combinar o horário, ou me manda msg falando que está me esperando";
      botoesDiv.innerHTML = "";
    };

    const nao = document.createElement("button");
    nao.innerText = "Não 😢";
    nao.className = "btn";

    nao.onmouseover = () => {
      nao.style.position = "absolute";
      nao.style.top = Math.random() * 80 + "%";
      nao.style.left = Math.random() * 80 + "%";
    };

    botoesDiv.appendChild(sim);
    botoesDiv.appendChild(nao);
  }
</script>

</body>
</html>
